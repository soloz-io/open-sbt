# PostgREST configuration for open-sbt dashboard API
# Reference: https://postgrest.org/en/stable/configuration.html

# Database connection (set via environment variable in production)
db-uri = "env:PGRST_DB_URI"

# Schema exposed as REST API (read-only dashboard schema)
db-schema = "dashboard"

# Anonymous role — used when no JWT is provided (should have no permissions)
db-anon-role = "postgrest_anon"

# JWT secret — must match Ory Hydra's signing key (RS256 via JWKS)
# Set PGRST_JWT_SECRET to the JWKS URL for RS256:
#   e.g. '{"jwks_uri":"http://hydra:4444/.well-known/jwks.json"}'
jwt-secret = "env:PGRST_JWT_SECRET"
jwt-aud = "env:PGRST_JWT_AUD"

# Connection pool — PostgREST manages its own pool on top of PgBouncer
db-pool = 10
db-pool-acquisition-timeout = 10

# Rate limiting is handled upstream by AgentGateway (Rust reverse proxy)
# PostgREST itself does not implement rate limiting

# Server
server-host = "0.0.0.0"
server-port = 3000

# Log level
log-level = "warn"
