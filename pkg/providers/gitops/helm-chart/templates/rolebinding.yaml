# 15.9 — RoleBinding: tenant admin role in tenant namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-admin
  namespace: tenant-{{ .Values.tenantId }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
  - kind: ServiceAccount
    name: tenant-{{ .Values.tenantId }}-sa
    namespace: tenant-{{ .Values.tenantId }}
